<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IR Server Ping Test</title>
  <script src="/version.js"></script>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b1220;color:#e5eef8}
    .wrap{max-width:720px;margin:0 auto;padding:24px 16px 96px}
    .card{background:#121b2d;border:1px solid #24314a;border-radius:16px;padding:16px;margin:0 0 16px}
    h1,h2{margin:0 0 8px} p{color:#9fb0ca} a,button{font:inherit}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .stat{display:block;background:#0f1726;border:1px solid #24314a;border-radius:12px;padding:14px}
    .stat strong{display:block;font-size:1rem}.stat small{display:block;color:#9fb0ca;margin-top:4px}
    nav{position:fixed;left:0;right:0;bottom:0;background:#121b2d;border-top:1px solid #24314a;display:flex;justify-content:center;gap:8px;padding:12px}
    nav a{color:#9fb0ca;text-decoration:none;padding:10px 14px;border-radius:10px} nav a.active{background:#1f3256;color:#fff}
    @media(max-width:520px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>IR Server Ping Test</h1>
      <p>Minimal comparison firmware for WiFi, AP setup, and OTA only.</p>
    </div>
    <div class="card">
      <h2>Live Status</h2>
      <div class="grid">
        <div class="stat"><strong id="mode">Loading...</strong><small>Network mode</small></div>
        <div class="stat"><strong id="ip">Loading...</strong><small>IP address</small></div>
        <div class="stat"><strong id="rssi">Loading...</strong><small>WiFi RSSI</small></div>
        <div class="stat"><strong id="heap">Loading...</strong><small>Free heap</small></div>
        <div class="stat"><strong id="minheap">Loading...</strong><small>Min free heap</small></div>
        <div class="stat"><strong id="maxheap">Loading...</strong><small>Max alloc block</small></div>
      </div>
      <p id="status">Refreshing...</p>
    </div>
  </div>
  <nav>
    <a class="active" href="/">Home</a>
    <a href="/config">Config</a>
    <a href="/system">System</a>
  </nav>
  <script>
    const byId=id=>document.getElementById(id);
    const fmt=b=>`${(Number(b||0)/1024).toFixed(1)} KB`;
    async function refresh(){
      const r=await fetch('/api/status');
      const d=await r.json();
      byId('mode').textContent=d.network_mode||'-';
      byId('ip').textContent=d.ip||'-';
      byId('rssi').textContent=d.wifi_rssi?`${d.wifi_rssi} dBm`:'-';
      byId('heap').textContent=fmt(d.heap_free);
      byId('minheap').textContent=fmt(d.heap_min_free);
      byId('maxheap').textContent=fmt(d.heap_max_alloc);
      byId('status').textContent=`${d.status||'idle'} | FW ${d.firmware_version} | FS ${d.filesystem_version}`;
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
