<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<style>body{font-family:Arial,sans-serif;margin:0;background:#101319;color:#e6edf3}.wrap{max-width:980px;margin:0 auto;padding:14px}.c{background:#171b22;border:1px solid #293042;border-radius:8px;padding:10px;margin:10px 0}nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}a{color:#101319;background:#d0d7de;padding:6px 9px;border-radius:6px;text-decoration:none;font-weight:600}input,select,textarea,button{width:100%;box-sizing:border-box;margin:4px 0;padding:7px;border-radius:6px;border:1px solid #3a4458;background:#0f141b;color:#e6edf3}button{cursor:pointer;background:#2ea043;border:0;color:#fff;font-weight:600}button.s{background:#1f6feb}.r{display:grid;grid-template-columns:1fr 1fr;gap:8px}label{display:block;font-size:12px;color:#b7c2d1;margin-top:6px}</style>
</head><body><div class='wrap'>
<nav><a href='/'>Home</a><a href='/d3net'>D3Net</a><a href='/config'>Config</a><a href='/rtu'>RTU</a><a href='/dinplug'>DINplug</a><a href='/monitor'>Monitor</a><a href='/firmware'>Firmware</a></nav>
<h2>RTU</h2><div class='c'>
<div class='r'><div><label for='rtu_tx'>TX pin (ESP32 -> RS485 DI)</label><input id='rtu_tx' type='number'></div><div><label for='rtu_rx'>RX pin (ESP32 <- RS485 RO)</label><input id='rtu_rx' type='number'></div></div>
<div class='r'><div><label for='rtu_de'>DE pin (Driver Enable)</label><input id='rtu_de' type='number'></div><div><label for='rtu_re'>RE pin (Receiver Enable)</label><input id='rtu_re' type='number'></div></div>
<div class='r'><div><label for='rtu_baud'>Baud rate</label><input id='rtu_baud' type='number'></div><div><label for='rtu_parity'>Parity</label><select id='rtu_parity'><option value='N'>Parity none</option><option value='E'>Parity even</option><option value='O'>Parity odd</option></select></div></div>
<div class='r'><div><label for='rtu_stop'>Stop bits</label><select id='rtu_stop'><option value='1'>Stop 1</option><option value='2'>Stop 2</option></select></div><div><label for='rtu_bits'>Data bits</label><select id='rtu_bits'><option value='8'>Data 8</option><option value='7'>Data 7</option></select></div></div>
<div class='r'><div><label for='rtu_slave'>Slave ID</label><input id='rtu_slave' type='number'></div><div><label for='rtu_timeout'>Timeout (ms)</label><input id='rtu_timeout' type='number'></div></div>
<div class='r'><button class='s' onclick='applyDefaults()'>Load defaults</button><button onclick='saveRtu()'>Save and reboot</button></div></div>
<script>
const J=(u,o)=>fetch(u,o).then(r=>r.json()),P=(u,b)=>fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});let defaults={tx_pin:17,rx_pin:16,de_pin:4,re_pin:5,baud_rate:19200,parity:'N',stop_bits:2,data_bits:8,slave_id:1,timeout_ms:3000};
function setVals(r){const m=(id,v)=>{let el=document.getElementById(id);if(el)el.value=v};m('rtu_tx',r.tx_pin);m('rtu_rx',r.rx_pin);m('rtu_de',r.de_pin);m('rtu_re',r.re_pin);m('rtu_baud',r.baud_rate);m('rtu_parity',r.parity);m('rtu_stop',r.stop_bits);m('rtu_bits',r.data_bits);m('rtu_slave',r.slave_id);m('rtu_timeout',r.timeout_ms);}
async function loadRtu(){let r=await J('/api/rtu');if(r.defaults)defaults=r.defaults;setVals(r);}function applyDefaults(){setVals(defaults);}async function saveRtu(){let b={tx_pin:parseInt(rtu_tx.value),rx_pin:parseInt(rtu_rx.value),de_pin:parseInt(rtu_de.value),re_pin:parseInt(rtu_re.value),baud_rate:parseInt(rtu_baud.value),parity:rtu_parity.value,stop_bits:parseInt(rtu_stop.value),data_bits:parseInt(rtu_bits.value),slave_id:parseInt(rtu_slave.value),timeout_ms:parseInt(rtu_timeout.value)};await P('/api/rtu',b);alert('Saved. Device will reboot.');}
loadRtu();
</script></div></body></html>
