<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<style>body{font-family:Arial,sans-serif;margin:0;background:#101319;color:#e6edf3}.wrap{max-width:980px;margin:0 auto;padding:14px}.c{background:#171b22;border:1px solid #293042;border-radius:8px;padding:10px;margin:10px 0}nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}a{color:#101319;background:#d0d7de;padding:6px 9px;border-radius:6px;text-decoration:none;font-weight:600}input,select,textarea,button{width:100%;box-sizing:border-box;margin:4px 0;padding:7px;border-radius:6px;border:1px solid #3a4458;background:#0f141b;color:#e6edf3}button{cursor:pointer;background:#2ea043;border:0;color:#fff;font-weight:600}button.s{background:#1f6feb}.r{display:grid;grid-template-columns:1fr 1fr;gap:8px}.t{background:#000;color:#0f0;height:230px;overflow:auto;padding:7px;font-family:monospace}</style>
</head><body><div class='wrap'>
<nav><a href='/'>Home</a><a href='/d3net'>D3Net</a><a href='/config'>Config</a><a href='/rtu'>RTU</a><a href='/dinplug'>DINplug</a><a href='/monitor'>Monitor</a><a href='/firmware'>Firmware</a></nav>
<h2>Monitor</h2><div class='c'><div class='r'><button id='toggleBtn' class='s' onclick='toggleMon()'>Toggle</button><button onclick='clearMon()'>Clear</button></div><p id='monStatus'>...</p><div class='t' id='term'></div></div>
<script>
const J=(u,o)=>fetch(u,o).then(r=>r.json()),P=(u,b)=>fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});let logSeq=0,monEnabled=true;
function setLabel(){document.getElementById('monStatus').innerText='Monitor: '+(monEnabled?'enabled':'disabled');document.getElementById('toggleBtn').innerText=monEnabled?'Disable':'Enable';}
async function loadMon(){let s=await J('/api/monitor');monEnabled=!!s.enabled;setLabel();}
async function toggleMon(){await P('/api/monitor/toggle',{enabled:!monEnabled});await loadMon();}
async function clearMon(){await fetch('/api/monitor/clear',{method:'POST'});document.getElementById('term').innerText='';logSeq=0;}
async function pollLogs(){let r=await J(`/api/logs?since=${logSeq}`);logSeq=r.latest||logSeq;let t=document.getElementById('term');for(let ln of r.lines)t.innerText+=ln.text;t.scrollTop=t.scrollHeight;}
setInterval(pollLogs,2000);loadMon();pollLogs();
</script></div></body></html>
