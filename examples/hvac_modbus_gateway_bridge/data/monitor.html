<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>HVAC Gateway Monitor</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #101319; color: #e6edf3; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 14px; }
    .card { background: #171b22; border: 1px solid #293042; border-radius: 8px; padding: 10px; margin: 10px 0; }
    nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    a { color: #101319; background: #d0d7de; padding: 6px 9px; border-radius: 6px; text-decoration: none; font-weight: 600; }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin: 4px 0;
      padding: 7px;
      border-radius: 6px;
      border: 1px solid #3a4458;
      background: #0f141b;
      color: #e6edf3;
    }
    button { cursor: pointer; background: #2ea043; border: 0; color: #fff; font-weight: 600; }
    button.secondary { background: #1f6feb; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .term {
      background: #000;
      color: #00ff6a;
      height: 260px;
      overflow: auto;
      padding: 8px;
      border-radius: 6px;
      font-family: Consolas, "Courier New", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .hint { color: #9fb1c7; font-size: 12px; }
    pre { background: #0f141b; border: 1px solid #3a4458; border-radius: 6px; padding: 8px; white-space: pre-wrap; word-break: break-word; }
    @media (max-width: 860px) {
      .row, .row3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class='wrap'>
    <nav>
      <a href='/'>Home</a>
      <a href='/config'>Config</a>
      <a href='/monitor'>Monitor</a>
      <a href='/firmware'>Firmware</a>
    </nav>

    <h2>HVAC Control + Telnet Monitor</h2>

    <div class='card'>
      <h3>Gateway-aware HVAC control</h3>
      <div class='hint' id='gwHint'>Loading gateway profile...</div>
      <div class='row3'>
        <div>
          <label for='zoneSel'>Online zone</label>
          <select id='zoneSel'></select>
        </div>
        <div>
          <label for='fieldSel'>Field</label>
          <select id='fieldSel' onchange='renderFieldInput()'>
            <option value='power'>power</option>
            <option value='mode'>mode</option>
            <option value='fan'>fan</option>
            <option value='setpoint'>setpoint</option>
          </select>
        </div>
        <div id='valueWrap'>
          <label for='valueSel'>Value</label>
          <select id='valueSel'></select>
          <input id='valueNum' style='display:none' type='number' step='0.1' min='16' max='30'>
        </div>
      </div>
      <div class='row'>
        <button onclick='sendCmd()'>Send Command</button>
        <button class='secondary' onclick='readZone()'>Read Zone</button>
      </div>
      <pre id='cmdOut'>Ready</pre>
    </div>

    <div class='card'>
      <h3>Telnet Monitor</h3>
      <div class='row'>
        <button id='toggleBtn' class='secondary' onclick='toggleMon()'>Toggle</button>
        <button onclick='clearMon()'>Clear</button>
      </div>
      <p id='monStatus'>...</p>
      <div id='term' class='term'></div>
    </div>
  </div>

  <script>
    const J = (u, o) => fetch(u, o).then(r => r.json());
    const P = (u, b) => fetch(u, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(b)
    }).then(r => r.json());

    let hvacMeta = null;

    async function refreshMeta() {
      hvacMeta = await J('/api/hvac/meta');
      const gw = hvacMeta.gateway_type || 'unknown';
      gwHint.textContent = `Gateway profile: ${gw}. Only online zones are listed.`;

      zoneSel.innerHTML = '';
      const zones = hvacMeta.online_zones || [];
      if (!zones.length) {
        const o = document.createElement('option');
        o.value = '';
        o.text = 'No online zones';
        zoneSel.appendChild(o);
      } else {
        for (const z of zones) {
          const o = document.createElement('option');
          o.value = z.index;
          o.text = `idx ${z.index} (slave ${z.slave}, ca ${z.central_address})`;
          zoneSel.appendChild(o);
        }
      }

      const min = (hvacMeta.setpoint_min_tenths || 160) / 10;
      const max = (hvacMeta.setpoint_max_tenths || 300) / 10;
      valueNum.min = min;
      valueNum.max = max;
      valueNum.value = min;

      renderFieldInput();
    }

    function renderFieldInput() {
      const field = fieldSel.value;
      valueSel.style.display = '';
      valueNum.style.display = 'none';
      valueSel.innerHTML = '';

      if (field === 'power') {
        const opts = [{v:1,t:'on (1)'},{v:0,t:'off (0)'}];
        for (const it of opts) {
          const o = document.createElement('option');
          o.value = it.v;
          o.text = it.t;
          valueSel.appendChild(o);
        }
        return;
      }

      if (field === 'mode') {
        for (const m of (hvacMeta?.modes || [])) {
          const o = document.createElement('option');
          o.value = m.value;
          o.text = `${m.label} (${m.value})`;
          valueSel.appendChild(o);
        }
        return;
      }

      if (field === 'fan') {
        for (const f of (hvacMeta?.fans || [])) {
          const o = document.createElement('option');
          o.value = f.value;
          o.text = `${f.label} (${f.value})`;
          valueSel.appendChild(o);
        }
        return;
      }

      valueSel.style.display = 'none';
      valueNum.style.display = '';
    }

    async function sendCmd() {
      if (!zoneSel.value) {
        cmdOut.textContent = 'No online zone available';
        return;
      }
      const field = fieldSel.value;
      const value = (field === 'setpoint') ? String(valueNum.value) : String(valueSel.value);
      const r = await P('/api/hvac/cmd', { index: +zoneSel.value, field, value });
      cmdOut.textContent = JSON.stringify(r, null, 2);
      await refreshMeta();
    }

    async function readZone() {
      if (!zoneSel.value) {
        cmdOut.textContent = 'No online zone available';
        return;
      }
      const r = await P('/api/hvac/read', { index: +zoneSel.value });
      cmdOut.textContent = JSON.stringify(r, null, 2);
      await refreshMeta();
    }

    let logSeq = 0;
    let monEnabled = true;
    let pollBusy = false;
    let pollTimer = 0;
    let pollDelay = 2000;
    let pollFailCount = 0;

    function setLabel(extra = '') {
      document.getElementById('monStatus').innerText =
        'Monitor: ' + (monEnabled ? 'enabled' : 'disabled') + (extra ? (' - ' + extra) : '');
      document.getElementById('toggleBtn').innerText = monEnabled ? 'Disable' : 'Enable';
    }

    function schedulePoll(ms) {
      if (pollTimer) clearTimeout(pollTimer);
      pollTimer = setTimeout(pollLogs, ms);
    }

    async function loadMon() {
      const s = await J('/api/monitor');
      monEnabled = !!s.enabled;
      setLabel();
    }

    async function toggleMon() {
      await P('/api/monitor/toggle', { enabled: !monEnabled });
      await loadMon();
    }

    async function clearMon() {
      await fetch('/api/monitor/clear', { method: 'POST' });
      document.getElementById('term').innerText = '';
      logSeq = 0;
    }

    async function pollLogs() {
      if (pollBusy) return;
      pollBusy = true;
      try {
        const r = await J('/api/logs?since=' + logSeq);
        pollFailCount = 0;
        pollDelay = 2000;
        logSeq = r.latest || logSeq;

        const term = document.getElementById('term');
        for (const ln of (r.lines || [])) {
          term.innerText += ln.text;
        }
        term.scrollTop = term.scrollHeight;
        setLabel();
      } catch (_e) {
        pollFailCount++;
        pollDelay = Math.min(8000, 2000 + pollFailCount * 1000);
        setLabel('reconnecting...');
      } finally {
        pollBusy = false;
        schedulePoll(pollDelay);
      }
    }

    loadMon().catch(() => {});
    refreshMeta().catch(() => {});
    setInterval(() => refreshMeta().catch(() => {}), 3000);
    pollLogs();
  </script>
</body>
</html>
