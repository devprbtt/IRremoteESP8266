<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HVAC Gateway - Configuration</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #1f6feb;
      --success: #238636;
      --success-hover: #2ea043;
      --input-bg: #010409;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    nav {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    nav a:hover {
      background: var(--border);
    }
    nav a.active {
      color: var(--accent);
      background: rgba(88, 166, 255, 0.1);
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 20px;
    }
    h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 16px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }
    input, select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
    }
    button {
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--success);
      color: #fff;
      border-color: rgba(240, 246, 252, 0.1);
    }
    .btn-primary:hover {
      background: var(--success-hover);
    }
    .btn-alt {
      background: #21262d;
      color: var(--accent);
      border-color: var(--border);
    }
    .btn-alt:hover {
      background: #30363d;
      border-color: #8b949e;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    pre {
      margin: 16px 0 0;
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      color: #79c0ff;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .scan-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 16px;
    }
    .scan-row .field { flex: 1; }
    .status-area {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      font-size: 13px;
    }
    .spin {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      display: none;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
      .wrap { padding: 12px; }
      .scan-row { flex-direction: column; align-items: stretch; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav>
      <a href="/">Dashboard</a>
      <a href="/config" class="active">Configuration</a>
      <a href="/monitor">Zone Monitor</a>
      <a href="/firmware">Firmware Update</a>
    </nav>
    <h1>Gateway Configuration</h1>

    <div class="card">
      <h2>Wi-Fi Settings</h2>
      <div class="scan-row">
        <div class="field">
          <label for="ssid_select">Nearby Networks</label>
          <select id="ssid_select" onchange="onSsidPick()">
            <option value="">Scan to see available networks</option>
          </select>
        </div>
        <button id="scanBtn" class="btn-alt" type="button" onclick="scanWifi()">Scan Wi-Fi</button>
      </div>
      <div class="status-area">
        <div id="scanSpin" class="spin"></div>
        <span id="scanStatus" class="hint">Idle</span>
      </div>

      <div class="grid" style="margin-top: 16px;">
        <div class="field">
          <label for="ssid">SSID</label>
          <input id="ssid" placeholder="Network name">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>System & HVAC</h2>
      <div class="grid">
        <div class="field">
          <label for="device_id">Device ID</label>
          <input id="device_id">
        </div>
        <div class="field">
          <label for="gateway_type">Gateway Type</label>
          <select id="gateway_type">
            <option value="lg_pmbusb00a">LG PMBUSB00A</option>
            <option value="midea_gw3_mod">Midea GW3-MOD</option>
            <option value="daikin_dta116a51">Daikin DTA116A51</option>
            <option value="hitachi_hca_mb">Hitachi HC-A MB</option>
          </select>
          <div id="gateway_hint" class="hint"></div>
        </div>
        <div class="field">
          <label for="zones">Zones (slave:address, ...)</label>
          <input id="zones" placeholder="1:0, 1:1, 1:2">
        </div>
        <div class="field">
          <label for="idu_address_base">IDU Address Base</label>
          <input id="idu_address_base" type="number" min="0" max="1">
        </div>
        <div class="field">
          <label for="poll_interval_ms">Poll Interval (ms)</label>
          <input id="poll_interval_ms" type="number">
        </div>
        <div class="field">
          <label for="mode_rate_limit_ms">Mode Rate Limit (ms)</label>
          <input id="mode_rate_limit_ms" type="number">
        </div>
        <div class="field">
          <label for="setpoint_min_tenths">Setpoint Min (x10°C)</label>
          <input id="setpoint_min_tenths" type="number">
        </div>
        <div class="field">
          <label for="setpoint_max_tenths">Setpoint Max (x10°C)</label>
          <input id="setpoint_max_tenths" type="number">
        </div>
        <div class="field">
          <label for="log_level">Log Level</label>
          <input id="log_level" type="number">
        </div>
        <div class="field">
          <label for="default_slave_id">Default Slave ID</label>
          <input id="default_slave_id" type="number" min="1" max="247">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Modbus / RS-485</h2>
      <div class="grid">
        <div class="field"><label for="tx_pin">TX Pin</label><input id="tx_pin" type="number"></div>
        <div class="field"><label for="rx_pin">RX Pin</label><input id="rx_pin" type="number"></div>
        <div class="field"><label for="de_pin">DE Pin</label><input id="de_pin" type="number"></div>
        <div class="field"><label for="baud">Baud Rate</label><input id="baud" type="number"></div>
        <div class="field"><label for="timeout_ms">Timeout (ms)</label><input id="timeout_ms" type="number"></div>
        <div class="field"><label for="retries">Retries</label><input id="retries" type="number"></div>
      </div>
    </div>

    <div class="card">
      <h2>OTA Settings</h2>
      <div class="grid">
        <div class="field">
          <label for="ota_firmware_url">Firmware URL</label>
          <input id="ota_firmware_url" placeholder="https://...">
        </div>
        <div class="field">
          <label for="ota_filesystem_url">Filesystem URL</label>
          <input id="ota_filesystem_url" placeholder="https://...">
        </div>
      </div>
      <div class="grid" style="margin-top: 16px;">
        <button type="button" class="btn-alt" onclick="startOta('firmware')">Start Firmware OTA</button>
        <button type="button" class="btn-alt" onclick="startOta('filesystem')">Start Filesystem OTA</button>
      </div>
      <pre id="ota_status">OTA Idle</pre>
    </div>

    <div class="card" style="text-align: right;">
      <button type="button" class="btn-primary" style="width: 100%; max-width: 300px;" onclick="saveConfig()">Save & Reboot</button>
      <pre id="status" style="text-align: left;">Ready</pre>
    </div>
  </div>

  <script>
    const J = (u, o) => fetch(u, o).then((r) => r.json());
    const P = (u, b) => fetch(u, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(b)
    }).then((r) => r.json());

    const GW = {
      lg_pmbusb00a: { iduBase: 0, spMin: 160, spMax: 300, hint: "LG: IDU base can be 0 or 1 depending on site." },
      midea_gw3_mod: { iduBase: 0, spMin: 160, spMax: 300, hint: "Midea: IDU base fixed to 0." },
      daikin_dta116a51: { iduBase: 0, spMin: 160, spMax: 300, hint: "Daikin: IDU base fixed to 0." },
      hitachi_hca_mb: { iduBase: 0, spMin: 160, spMax: 320, hint: "Hitachi: IDU base fixed to 0." }
    };

    function setScanState(active, msg) {
      document.getElementById("scanSpin").style.display = active ? "block" : "none";
      document.getElementById("scanBtn").disabled = active;
      document.getElementById("scanStatus").textContent = msg;
    }

    function onSsidPick() {
      const sel = document.getElementById("ssid_select");
      if (sel.value) document.getElementById("ssid").value = sel.value;
    }

    function applyGatewayProfile(gw, hardApply) {
      const p = GW[gw] || GW.lg_pmbusb00a;
      document.getElementById("gateway_hint").textContent = p.hint;
      if (hardApply) {
        document.getElementById("idu_address_base").value = p.iduBase;
        document.getElementById("setpoint_min_tenths").value = p.spMin;
        document.getElementById("setpoint_max_tenths").value = p.spMax;
      }
    }

    async function loadConfig() {
      const c = await J("/api/config");
      document.getElementById("ssid").value = c.wifi.ssid || "";
      document.getElementById("zones").value = (c.hvac.zones || []).map((z) => `${z.slave}:${z.central_address}`).join(",");
      document.getElementById("idu_address_base").value = c.hvac.idu_address_base;
      document.getElementById("gateway_type").value = c.hvac.gateway_type || "lg_pmbusb00a";
      document.getElementById("device_id").value = c.device_id || "";
      document.getElementById("poll_interval_ms").value = c.hvac.poll_interval_ms;
      document.getElementById("default_slave_id").value = c.modbus.default_slave;
      document.getElementById("tx_pin").value = c.modbus.tx;
      document.getElementById("rx_pin").value = c.modbus.rx;
      document.getElementById("de_pin").value = c.modbus.de;
      document.getElementById("baud").value = c.modbus.baud;
      document.getElementById("timeout_ms").value = c.modbus.timeout_ms;
      document.getElementById("retries").value = c.modbus.retries;
      document.getElementById("setpoint_min_tenths").value = c.hvac.setpoint_min_tenths;
      document.getElementById("setpoint_max_tenths").value = c.hvac.setpoint_max_tenths;
      document.getElementById("mode_rate_limit_ms").value = c.hvac.mode_rate_limit_ms;
      document.getElementById("log_level").value = c.log_level;
      document.getElementById("ota_firmware_url").value = (c.ota && c.ota.firmware_url) || "";
      document.getElementById("ota_filesystem_url").value = (c.ota && c.ota.filesystem_url) || "";
      applyGatewayProfile(document.getElementById("gateway_type").value, false);
    }

    async function scanWifi() {
      setScanState(true, "Scanning...");
      try {
        const r = await fetch("/api/wifi/scan").then((x) => x.json());
        const list = r.items || r.networks || [];
        const s = document.getElementById("ssid_select");
        s.innerHTML = '<option value="">Select SSID</option>';
        list.forEach(ap => {
          const o = document.createElement("option");
          o.value = ap.ssid;
          o.text = `${ap.ssid} (${ap.rssi}dBm)`;
          s.appendChild(o);
        });
        setScanState(false, `Found ${list.length} networks`);
      } catch (e) {
        setScanState(false, "Scan failed");
      }
    }

    async function saveConfig() {
      const body = {
        ssid: document.getElementById("ssid").value,
        password: document.getElementById("password").value,
        zones: document.getElementById("zones").value,
        gateway_type: document.getElementById("gateway_type").value,
        device_id: document.getElementById("device_id").value,
        idu_address_base: +document.getElementById("idu_address_base").value,
        poll_interval_ms: +document.getElementById("poll_interval_ms").value,
        default_slave_id: +document.getElementById("default_slave_id").value,
        tx_pin: +document.getElementById("tx_pin").value,
        rx_pin: +document.getElementById("rx_pin").value,
        de_pin: +document.getElementById("de_pin").value,
        baud: +document.getElementById("baud").value,
        timeout_ms: +document.getElementById("timeout_ms").value,
        retries: +document.getElementById("retries").value,
        setpoint_min_tenths: +document.getElementById("setpoint_min_tenths").value,
        setpoint_max_tenths: +document.getElementById("setpoint_max_tenths").value,
        mode_rate_limit_ms: +document.getElementById("mode_rate_limit_ms").value,
        log_level: +document.getElementById("log_level").value,
        ota_firmware_url: document.getElementById("ota_firmware_url").value,
        ota_filesystem_url: document.getElementById("ota_filesystem_url").value
      };
      const r = await P("/api/config/save", body);
      document.getElementById("status").textContent = JSON.stringify(r, null, 2);
    }

    async function startOta(type) {
      const url = type === 'firmware' ? document.getElementById("ota_firmware_url").value : document.getElementById("ota_filesystem_url").value;
      const r = await P("/api/ota/start", { type, url });
      document.getElementById("ota_status").textContent = JSON.stringify(r, null, 2);
    }

    loadConfig();
    document.getElementById("gateway_type").addEventListener("change", (e) => applyGatewayProfile(e.target.value, true));
    setInterval(async () => {
      try {
        const s = await J("/api/ota/status");
        document.getElementById("ota_status").textContent = JSON.stringify(s, null, 2);
      } catch(e) {}
    }, 2000);
  </script>
</body>
</html>
