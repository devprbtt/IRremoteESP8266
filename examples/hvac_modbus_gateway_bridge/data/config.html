<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><style>body{font-family:Arial,sans-serif;margin:0;background:#101319;color:#e6edf3}.wrap{max-width:980px;margin:0 auto;padding:14px}.c{background:#171b22;border:1px solid #293042;border-radius:8px;padding:10px;margin:10px 0}nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}a{color:#101319;background:#d0d7de;padding:6px 9px;border-radius:6px;text-decoration:none;font-weight:600}input,select,button{width:100%;box-sizing:border-box;margin:4px 0;padding:7px;border-radius:6px;border:1px solid #3a4458;background:#0f141b;color:#e6edf3}button{cursor:pointer;background:#2ea043;border:0;color:#fff;font-weight:600}button.s{background:#1f6feb}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}pre{white-space:pre-wrap;word-break:break-word;background:#0f141b;border:1px solid #3a4458;padding:8px;border-radius:6px}</style></head><body><div class='wrap'><nav><a href='/'>Home</a><a href='/config'>Config</a><a href='/monitor'>Monitor</a></nav><h2>Config</h2><div class='c'><input id='ssid' placeholder='SSID'><input id='password' placeholder='Password' type='password'><div class='grid'><input id='zones' placeholder='Zones CSV: 1:0,1:1,1:2'><input id='idu_address_base' type='number' min='0' max='1' placeholder='IDU base'></div><div class='grid'><select id='gateway_type'><option value='lg_pmbusb00a'>LG PMBUSB00A</option><option value='midea_gw3_mod'>Midea GW3-MOD</option><option value='daikin_dta116a51'>Daikin DTA116A51</option></select><input id='device_id' placeholder='Device ID'></div><div class='grid'><input id='poll_interval_ms' type='number' placeholder='Poll interval ms'><input id='default_slave_id' type='number' min='1' max='247' placeholder='Default slave'></div><div class='grid'><input id='tx_pin' type='number' placeholder='TX pin'><input id='rx_pin' type='number' placeholder='RX pin'></div><div class='grid'><input id='de_pin' type='number' placeholder='DE pin'><input id='baud' type='number' placeholder='Baud'></div><div class='grid'><input id='timeout_ms' type='number' placeholder='Timeout ms'><input id='retries' type='number' placeholder='Retries'></div><div class='grid'><input id='setpoint_min_tenths' type='number' placeholder='Setpoint min (tenths)'><input id='setpoint_max_tenths' type='number' placeholder='Setpoint max (tenths)'></div><div class='grid'><input id='mode_rate_limit_ms' type='number' placeholder='Mode rate-limit ms'><input id='log_level' type='number' placeholder='Log level'></div><button class='s' onclick='scanWifi()'>Scan Wi-Fi</button><pre id='scan'>[]</pre><button onclick='saveConfig()'>Save Config and Reboot</button><pre id='status'>Ready</pre></div><script>const J=(u,o)=>fetch(u,o).then(r=>r.json());const P=(u,b)=>fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json());async function loadConfig(){  const c=await J('/api/config');  ssid.value=c.wifi.ssid||'';password.value='';  zones.value=(c.hvac.zones||[]).map(z=>`${z.slave}:${z.central_address}`).join(',');  idu_address_base.value=c.hvac.idu_address_base;  gateway_type.value=c.hvac.gateway_type||'lg_pmbusb00a';  device_id.value=c.device_id||'hvac-modbus-gateway-bridge';  poll_interval_ms.value=c.hvac.poll_interval_ms;  default_slave_id.value=c.modbus.default_slave;  tx_pin.value=c.modbus.tx;rx_pin.value=c.modbus.rx;de_pin.value=c.modbus.de;  baud.value=c.modbus.baud;timeout_ms.value=c.modbus.timeout_ms;retries.value=c.modbus.retries;  setpoint_min_tenths.value=c.hvac.setpoint_min_tenths;setpoint_max_tenths.value=c.hvac.setpoint_max_tenths;  mode_rate_limit_ms.value=c.hvac.mode_rate_limit_ms;log_level.value=c.log_level;}async function scanWifi(){  const s=await J('/api/wifi/scan');  scan.textContent=JSON.stringify(s.items||[],null,2);}async function saveConfig(){  const body={    ssid:ssid.value,password:password.value,zones:zones.value,    gateway_type:gateway_type.value,device_id:device_id.value,    idu_address_base:+idu_address_base.value,poll_interval_ms:+poll_interval_ms.value,default_slave_id:+default_slave_id.value,    tx_pin:+tx_pin.value,rx_pin:+rx_pin.value,de_pin:+de_pin.value,baud:+baud.value,timeout_ms:+timeout_ms.value,retries:+retries.value,    setpoint_min_tenths:+setpoint_min_tenths.value,setpoint_max_tenths:+setpoint_max_tenths.value,    mode_rate_limit_ms:+mode_rate_limit_ms.value,log_level:+log_level.value  };  const r=await P('/api/config/save',body);  status.textContent=JSON.stringify(r,null,2);}loadConfig();</script></div></body></html>
