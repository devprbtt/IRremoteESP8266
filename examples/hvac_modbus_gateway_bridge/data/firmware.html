<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<style>body{font-family:Arial,sans-serif;margin:0;background:#101319;color:#e6edf3}.wrap{max-width:980px;margin:0 auto;padding:14px}.c{background:#171b22;border:1px solid #293042;border-radius:8px;padding:10px;margin:10px 0}nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}a{color:#101319;background:#d0d7de;padding:6px 9px;border-radius:6px;text-decoration:none;font-weight:600}input,select,textarea,button{width:100%;box-sizing:border-box;margin:4px 0;padding:7px;border-radius:6px;border:1px solid #3a4458;background:#0f141b;color:#e6edf3}button{cursor:pointer;background:#2ea043;border:0;color:#fff;font-weight:600}.m{height:10px;background:#2a3243;border-radius:8px;overflow:hidden}.b{height:10px;background:#2ea043;width:0%}.warn{color:#f2cc60;font-size:12px}.r{display:grid;grid-template-columns:1fr 1fr;gap:8px}@media (max-width:860px){.r{grid-template-columns:1fr}}</style>
</head><body><div class='wrap'>
<nav><a href='/'>Home</a><a href='/config'>Config</a><a href='/monitor'>Monitor</a><a href='/firmware'>Firmware</a></nav>
<h2>OTA</h2>
<div class='c'>
  <h3>Firmware (.bin)</h3>
  <input id='fw' type='file' accept='.bin,application/octet-stream'>
  <button id='fwBtn' onclick='uploadFw()'>Upload Firmware</button>
  <div class='m'><div id='ota_bar' class='b'></div></div>
  <div id='ota_status'>idle</div>
</div>
<div class='c'>
  <h3>SPIFFS Image (spiffs.bin)</h3>
  <p class='warn'>Use only filesystem image generated by this project (`pio run -t buildfs`). Device will reboot after upload.</p>
  <input id='fs' type='file' accept='.bin,application/octet-stream'>
  <button id='fsBtn' onclick='uploadFs()'>Upload SPIFFS</button>
  <div class='m'><div id='fs_bar' class='b'></div></div>
  <div id='fs_status'>idle</div>
</div>
<div class='c'>
  <h3>URL OTA</h3>
  <div class='r'>
    <div><label>Firmware URL</label><input id='fw_url' placeholder='https://host/firmware.bin'></div>
    <div><label>Filesystem URL</label><input id='fs_url' placeholder='https://host/spiffs.bin'></div>
  </div>
  <div class='r'>
    <button onclick='startUrlOta("firmware")'>Start Firmware URL OTA</button>
    <button onclick='startUrlOta("filesystem")'>Start Filesystem URL OTA</button>
  </div>
  <pre id='url_ota_status'>idle</pre>
</div>
<script>
const J=(u,o)=>fetch(u,o).then(r=>r.json());
const P=(u,b)=>fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json());

function uploadBin(fileId,btnId,url,barId,statusId,label){
  const f=document.getElementById(fileId).files[0];if(!f)return;
  const btn=document.getElementById(btnId);btn.disabled=true;
  const xhr=new XMLHttpRequest();xhr.open('POST',url,true);
  xhr.upload.onprogress=(ev)=>{if(!ev.lengthComputable)return;const p=Math.round((ev.loaded/ev.total)*100);document.getElementById(barId).style.width=p+'%';document.getElementById(statusId).innerText='Uploading '+label+' '+p+'%';};
  xhr.onerror=()=>{btn.disabled=false;document.getElementById(statusId).innerText=label+' upload failed';};
  xhr.onload=()=>{btn.disabled=false;if(xhr.status>=200&&xhr.status<300){document.getElementById(statusId).innerText=label+' upload complete. Rebooting...';}else{document.getElementById(statusId).innerText=label+' update failed ('+xhr.status+')';}};
  xhr.send(f);
}

function uploadFw(){uploadBin('fw','fwBtn','/firmware/update','ota_bar','ota_status','Firmware');}
function uploadFs(){uploadBin('fs','fsBtn','/spiffs/update','fs_bar','fs_status','SPIFFS');}

async function startUrlOta(type){
  const body={type};
  if(type==='firmware'&&fw_url.value.trim()) body.url=fw_url.value.trim();
  if(type==='filesystem'&&fs_url.value.trim()) body.url=fs_url.value.trim();
  const r=await P('/api/ota/start',body);
  url_ota_status.textContent=JSON.stringify(r,null,2);
}

async function pollUrlOta(){
  try{const s=await J('/api/ota/status');url_ota_status.textContent=JSON.stringify(s,null,2);}catch(_e){}
}
setInterval(pollUrlOta,2000);
pollUrlOta();
</script></div></body></html>
