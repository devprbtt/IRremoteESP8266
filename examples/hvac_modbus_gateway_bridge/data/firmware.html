<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HVAC Gateway - Firmware Update</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #238636;
      --input-bg: #010409;
      --error: #f85149;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    nav {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    nav a:hover {
      background: var(--border);
    }
    nav a.active {
      color: var(--accent);
      background: rgba(88, 166, 255, 0.1);
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 20px;
    }
    h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 16px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }
    input[type="file"] {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px;
      font-size: 14px;
    }
    input[type="text"] {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      background: #21262d;
      color: var(--accent);
      transition: 0.2s;
    }
    button:hover { background: #30363d; border-color: #8b949e; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress-wrap {
      height: 10px;
      background: #21262d;
      border-radius: 5px;
      margin: 12px 0;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .progress-bar {
      height: 100%;
      background: var(--success);
      width: 0%;
      transition: width 0.3s;
    }
    .status-text {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .warn {
      font-size: 13px;
      color: #d29922;
      background: rgba(187, 128, 9, 0.1);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid rgba(187, 128, 9, 0.4);
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    pre {
      margin-top: 12px;
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      color: #79c0ff;
      white-space: pre-wrap;
    }
    @media (max-width: 600px) {
      .wrap { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav>
      <a href="/">Dashboard</a>
      <a href="/config">Configuration</a>
      <a href="/monitor">Zone Monitor</a>
      <a href="/firmware" class="active">Firmware Update</a>
    </nav>
    <h1>OTA Update</h1>

    <div class="card">
      <h2>Local File Upload</h2>
      <div class="grid">
        <div class="field">
          <label for="fw">Firmware (.bin)</label>
          <input id="fw" type="file" accept=".bin">
          <button id="fwBtn" onclick="uploadFw()">Upload Firmware</button>
          <div class="progress-wrap"><div id="ota_bar" class="progress-bar"></div></div>
          <div id="ota_status" class="status-text">Idle</div>
        </div>
        <div class="field">
          <label for="fs">Filesystem (spiffs.bin)</label>
          <div class="warn">Use only images generated by this project. Device reboots after upload.</div>
          <input id="fs" type="file" accept=".bin">
          <button id="fsBtn" onclick="uploadFs()">Upload Filesystem</button>
          <div class="progress-wrap"><div id="fs_bar" class="progress-bar"></div></div>
          <div id="fs_status" class="status-text">Idle</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>URL OTA</h2>
      <div class="grid">
        <div class="field">
          <label for="fw_url">Firmware URL</label>
          <input id="fw_url" type="text" placeholder="https://host/firmware.bin">
        </div>
        <div class="field">
          <label for="fs_url">Filesystem URL</label>
          <input id="fs_url" type="text" placeholder="https://host/spiffs.bin">
        </div>
      </div>
      <div style="display: flex; gap: 12px; margin-top: 12px;">
        <button onclick="startUrlOta('firmware')">Start FW URL OTA</button>
        <button onclick="startUrlOta('filesystem')">Start FS URL OTA</button>
      </div>
      <pre id="url_ota_status">Idle</pre>
    </div>
  </div>

  <script>
    const J = (u, o) => fetch(u, o).then(r => r.json());
    const P = (u, b) => fetch(u, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(b)
    }).then(r => r.json());

    function uploadBin(fileId, btnId, url, barId, statusId, label) {
      const f = document.getElementById(fileId).files[0];
      if (!f) return;
      const btn = document.getElementById(btnId);
      btn.disabled = true;
      const xhr = new XMLHttpRequest();
      xhr.open('POST', url, true);
      xhr.upload.onprogress = (ev) => {
        if (!ev.lengthComputable) return;
        const p = Math.round((ev.loaded / ev.total) * 100);
        document.getElementById(barId).style.width = p + '%';
        document.getElementById(statusId).innerText = `Uploading ${label}: ${p}%`;
      };
      xhr.onerror = () => {
        btn.disabled = false;
        document.getElementById(statusId).innerText = `${label} upload failed`;
        document.getElementById(statusId).style.color = 'var(--error)';
      };
      xhr.onload = () => {
        btn.disabled = false;
        if (xhr.status >= 200 && xhr.status < 300) {
          document.getElementById(statusId).innerText = `${label} upload complete. Rebooting...`;
          document.getElementById(statusId).style.color = 'var(--success)';
        } else {
          document.getElementById(statusId).innerText = `${label} failed (${xhr.status})`;
          document.getElementById(statusId).style.color = 'var(--error)';
        }
      };
      xhr.send(f);
    }

    function uploadFw() { uploadBin('fw', 'fwBtn', '/firmware/update', 'ota_bar', 'ota_status', 'Firmware'); }
    function uploadFs() { uploadBin('fs', 'fsBtn', '/spiffs/update', 'fs_bar', 'fs_status', 'SPIFFS'); }

    async function startUrlOta(type) {
      const body = { type };
      if (type === 'firmware') body.url = document.getElementById('fw_url').value.trim();
      else body.url = document.getElementById('fs_url').value.trim();
      if (!body.url) return;
      const r = await P('/api/ota/start', body);
      document.getElementById('url_ota_status').textContent = JSON.stringify(r, null, 2);
    }

    async function pollUrlOta() {
      try {
        const s = await J('/api/ota/status');
        document.getElementById('url_ota_status').textContent = JSON.stringify(s, null, 2);
      } catch (e) {}
    }

    setInterval(pollUrlOta, 2000);
    pollUrlOta();
  </script>
</body>
</html>
