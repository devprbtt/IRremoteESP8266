<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HVAC Gateway - Home</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --nav-bg: #161b22;
      --nav-link: #c9d1d9;
      --nav-active: #58a6ff;
      --pre-bg: #010409;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    nav {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    nav a {
      color: var(--nav-link);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    nav a:hover {
      background: var(--border);
    }
    nav a.active {
      color: var(--nav-active);
      background: rgba(88, 166, 255, 0.1);
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 20px;
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    pre {
      margin: 8px 0 0;
      padding: 12px;
      background: var(--pre-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #79c0ff;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #238636;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }
    @media (max-width: 600px) {
      .wrap { padding: 12px; }
      h1 { font-size: 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav>
      <a href="/" class="active">Dashboard</a>
      <a href="/config">Configuration</a>
      <a href="/monitor">Zone Monitor</a>
      <a href="/firmware">Firmware Update</a>
    </nav>
    <h1>HVAC Modbus Gateway</h1>

    <div class="grid">
      <div class="card">
        <h2>Network</h2>
        <pre id="net">Loading...</pre>
      </div>
      <div class="card">
        <h2>System</h2>
        <pre id="sys">Loading...</pre>
      </div>
    </div>

    <div class="card" style="margin-top: 20px;">
      <h2>Zone Snapshot</h2>
      <pre id="zones">Loading...</pre>
      <div class="meta">
        <span class="status-dot"></span> Live updates every 3 seconds
      </div>
    </div>
  </div>

  <script>
    const J = (u) => fetch(u).then((r) => r.json());

    async function refresh() {
      try {
        const [s, z] = await Promise.all([J("/api/status"), J("/api/zones")]);

        document.getElementById('net').textContent =
          `Mode:      ${s.wifi_mode}\n` +
          `Connected: ${s.wifi_connected}\n` +
          `IP:        ${s.ip || "-"}\n` +
          `AP SSID:   ${s.ap_ssid || "-"}`;

        document.getElementById('sys').textContent =
          `Device:    ${s.device_id}\n` +
          `Uptime:    ${(s.uptime_ms / 1000).toFixed(1)}s\n` +
          `IDU base:  ${s.idu_address_base}\n` +
          `Poll int:  ${s.poll_interval_ms}ms`;

        document.getElementById('zones').textContent = JSON.stringify(z.zones || [], null, 2);
      } catch (e) {
        console.error("Failed to refresh status", e);
      }
    }

    setInterval(refresh, 3000);
    refresh();
  </script>
</body>
</html>
