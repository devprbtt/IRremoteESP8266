<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HVAC Gateway Home</title>
  <style>
    :root { --bg:#101319; --panel:#171b22; --line:#2b3344; --text:#e6edf3; --muted:#9fb1c7; }
    body { margin:0; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1050px; margin:0 auto; padding:14px; }
    nav { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
    a { color:#101319; background:#d0d7de; padding:6px 9px; border-radius:6px; text-decoration:none; font-weight:600; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; margin:10px 0; }
    h2 { margin:6px 0 10px; }
    h3 { margin:4px 0 10px; color:var(--muted); font-size:15px; font-weight:700; letter-spacing:.2px; }
    pre { margin:0; white-space:pre-wrap; word-break:break-word; background:#0f141b; border:1px solid #3a4458; padding:8px; border-radius:7px; }
    .meta { color:var(--muted); font-size:12px; margin-top:8px; }
    @media (max-width: 860px) { .grid2 { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <nav><a href="/">Home</a><a href="/config">Config</a><a href="/monitor">Monitor</a><a href="/firmware">Firmware</a></nav>
    <h2>HVAC Modbus Gateway Bridge</h2>

    <div class="grid2">
      <div class="card">
        <h3>Network</h3>
        <pre id="net">Loading...</pre>
      </div>
      <div class="card">
        <h3>System</h3>
        <pre id="sys">Loading...</pre>
      </div>
    </div>

    <div class="card">
      <h3>Zone Snapshot</h3>
      <pre id="zones">Loading...</pre>
      <div class="meta">Auto refresh every 3 seconds</div>
    </div>
  </div>

  <script>
    const J = (u, o) => fetch(u, o).then((r) => r.json());

    async function refresh() {
      const s = await J("/api/status");
      const z = await J("/api/zones");

      net.textContent =
        `Mode: ${s.wifi_mode}\n` +
        `Connected: ${s.wifi_connected}\n` +
        `IP: ${s.ip || "-"}\n` +
        `AP SSID: ${s.ap_ssid || "-"}`;

      sys.textContent =
        `Device: ${s.device_id}\n` +
        `Uptime (ms): ${s.uptime_ms}\n` +
        `IDU base: ${s.idu_address_base}\n` +
        `Poll interval (ms): ${s.poll_interval_ms}`;

      zones.textContent = JSON.stringify(z.zones || [], null, 2);
    }

    setInterval(refresh, 3000);
    refresh();
  </script>
</body>
</html>
