<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#0a0e14">
  <title>HVAC Test - IR HVAC Telnet</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}:root{--bg:#0a0e14;--surface:#151b24;--surface-elevated:#1c232e;--border:#2a3444;--text:#f0f4f8;--text-muted:#8899aa;--primary:#3b82f6;--success:#22c55e;--radius:12px;--radius-sm:8px}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}.container{max-width:820px;margin:0 auto;padding:16px;padding-bottom:100px}.header{text-align:center;padding:24px 0 16px}.header h1{margin:0;font-size:1.5rem}.header p{margin:4px 0 0;color:var(--text-muted);font-size:.875rem}nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 16px calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:8px;z-index:100}nav a{flex:1;max-width:100px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 12px;border-radius:var(--radius-sm);text-decoration:none;color:var(--text-muted);font-size:.7rem;font-weight:600}nav a svg{width:22px;height:22px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}.card h3{margin:0 0 12px;font-size:.95rem}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase}input,select,button{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-elevated);color:var(--text);font-size:.9rem}button{border:none;background:var(--success);color:#fff;font-weight:600;cursor:pointer}.secondary{background:var(--primary)}pre{padding:12px;background:var(--surface-elevated);border-radius:var(--radius-sm);font-family:Consolas,"Courier New",monospace;font-size:.8rem;white-space:pre-wrap;word-break:break-word}@media (max-width:860px){.grid{grid-template-columns:1fr}}</style>
</head>
<body>
  <div class="container">
    <header class="header"><h1>HVAC Test</h1><p>Send protocol commands and raw IR payloads</p></header>
    <div class="card">
      <h3>Test Registered HVAC</h3>
      <form id="test_form">
        <div class="grid">
          <div class="field"><label>HVAC</label><select name="id" id="hvac_id"></select></div>
          <div class="field"><label>Power</label><select name="power" id="power"><option value="on">on</option><option value="off">off</option></select></div>
          <div class="field"><label>Mode</label><select name="mode" id="mode"><option>auto</option><option>cool</option><option>heat</option><option>dry</option><option>fan</option></select></div>
          <div class="field"><label>Temp</label><input name="temp" id="temp" value="24"></div>
          <div class="field"><label>Fan</label><select name="fan" id="fan"><option>auto</option><option>low</option><option>medium</option><option>high</option></select></div>
          <div class="field"><label>Swing V</label><select name="swingv" id="swingv"><option>off</option><option>auto</option><option>low</option><option>middle</option><option>high</option></select></div>
          <div class="field"><label>Swing H</label><select name="swingh" id="swingh"><option>off</option><option>auto</option><option>left</option><option>middle</option><option>right</option></select></div>
          <div class="field"><label>Light</label><select name="light" id="light"><option value="">default</option><option value="true">on</option><option value="false">off</option></select></div>
          <div class="field" id="custom_wrap" style="display:none"><label>Custom Command</label><select name="command_name" id="command_name"></select></div>
        </div>
        <button type="submit" style="margin-top:12px">Send Test</button>
      </form>
      <h4>Generated JSON</h4><pre id="preview">{}</pre>
      <h4>Response</h4><pre id="response">-</pre>
    </div>
    <div class="card">
      <h3>Send Raw Code</h3>
      <form id="raw_form">
        <div class="grid">
          <div class="field"><label>Emitter</label><select name="emitter" id="raw_emitter"></select></div>
          <div class="field"><label>Encoding</label><select name="encoding"><option value="pronto">pronto</option><option value="gc">gc</option><option value="racepoint">racepoint</option><option value="rawhex">rawhex</option></select></div>
          <div class="field"><label>Code</label><input name="code" placeholder="0000 006D ..."></div>
        </div>
        <button class="secondary" type="submit" style="margin-top:12px">Send Raw</button>
      </form>
      <h4>Raw Response</h4><pre id="raw_response">-</pre>
    </div>
  </div>
  <nav>
    <a href="/"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Home</a>
    <a href="/config"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Config</a>
    <a href="/system#monitor"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Monitor</a>
    <a href="/system#firmware"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>Firmware</a>
  </nav>
  <script>
    const J=(u,o)=>fetch(u,o).then(r=>r.json());
    let cfg;
    function emitterOptions(){return (cfg.emitters||[]).map((e,i)=>`<option value="${i}">${i} (GPIO ${e.gpio})</option>`).join('');}
    function sync(){const idx=document.getElementById('hvac_id').selectedIndex;const h=(cfg.hvacs||[])[idx];if(!h)return;const custom=h.protocol==='CUSTOM';document.getElementById('custom_wrap').style.display=custom?'block':'none';['power','mode','temp','fan','swingv','swingh','light'].forEach(id=>document.getElementById(id).disabled=custom);const sel=document.getElementById('command_name');sel.innerHTML='';if(custom){(h.custom&&h.custom.commands||[]).forEach(c=>{sel.innerHTML+=`<option value="${c.name}">${c.name} (${c.encoding||'pronto'})</option>`;});} preview();}
    function preview(){const form=new FormData(document.getElementById('test_form'));const data={cmd:'send'};for(const [k,v] of form.entries()){if(v!=='')data[k]=v;}document.getElementById('preview').textContent=JSON.stringify(data,null,2);}
    async function init(){cfg=await J('/api/config');document.getElementById('hvac_id').innerHTML=(cfg.hvacs||[]).map(h=>`<option value="${h.id}">${h.id} (${h.protocol})</option>`).join('');document.getElementById('raw_emitter').innerHTML=emitterOptions();document.getElementById('hvac_id').addEventListener('change',sync);document.getElementById('test_form').addEventListener('input',preview);document.getElementById('test_form').addEventListener('submit',async e=>{e.preventDefault();const res=await fetch('/hvacs/test',{method:'POST',body:new URLSearchParams(new FormData(e.target))});document.getElementById('response').textContent=JSON.stringify(await res.json(),null,2);});document.getElementById('raw_form').addEventListener('submit',async e=>{e.preventDefault();const res=await fetch('/raw/test',{method:'POST',body:new URLSearchParams(new FormData(e.target))});document.getElementById('raw_response').textContent=JSON.stringify(await res.json(),null,2);});sync();}
    init().catch(e=>{document.getElementById('response').textContent='Load failed: '+e;});
  </script>
</body>
</html>
