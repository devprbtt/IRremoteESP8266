<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#0a0e14"><title>DINplug - IR Server Telnet</title>
  <script src="/version.js"></script><style>*,*::before,*::after{box-sizing:border-box}:root{--bg:#0a0e14;--surface:#151b24;--surface-elevated:#1c232e;--border:#2a3444;--text:#f0f4f8;--text-muted:#8899aa;--primary:#3b82f6;--success:#22c55e;--radius:12px;--radius-sm:8px}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}.container{max-width:760px;margin:0 auto;padding:16px;padding-bottom:100px}.header{text-align:center;padding:24px 0 16px}.header h1{margin:0;font-size:1.5rem}.header p{margin:4px 0 0;color:var(--text-muted);font-size:.875rem}nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 16px calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:8px;z-index:100}nav a{flex:1;max-width:100px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 12px;border-radius:var(--radius-sm);text-decoration:none;color:var(--text-muted);font-size:.7rem;font-weight:600}nav a svg{width:22px;height:22px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase}input,button{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-elevated);color:var(--text);font-size:.9rem}button{border:none;background:var(--success);color:#fff;font-weight:600;cursor:pointer}.secondary{background:var(--primary)}.check{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-elevated);border-radius:var(--radius-sm);margin:12px 0}.check input{width:auto;margin:0}.status{padding:12px;background:var(--surface-elevated);border-radius:var(--radius-sm);font-family:Consolas,"Courier New",monospace;font-size:.8rem;white-space:pre-wrap}</style></head><body><div class="container"><header class="header"><h1>DINplug</h1><p>Gateway status and connection settings</p></header><div class="card"><h3>Gateway Settings</h3><div class="status" id="info">Loading...</div><form method="POST" action="/dinplug/save" style="margin-top:12px"><div class="field"><label for="gateway_host">Gateway Host or IP</label><input id="gateway_host" name="gateway_host" placeholder="dinplug.example.com or 192.168.1.50"></div><label class="check"><input id="auto_connect" type="checkbox" name="auto_connect"><span>Connect on boot</span></label><button type="submit">Save DINplug Settings</button></form><form method="POST" action="/dinplug/test" style="margin-top:12px"><button class="secondary" type="submit">Test Connection</button></form></div></div><nav><a href="/"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Home</a><a href="/config"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Config</a><a href="/system#monitor"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Monitor</a><a href="/system#firmware"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>Firmware</a></nav><script>const J=(u,o)=>fetch(u,o).then(r=>r.json());async function init(){const [cfg,status]=await Promise.all([J('/api/config'),J('/api/status')]);document.getElementById('gateway_host').value=(cfg.dinplug&&cfg.dinplug.gateway_host)||'';document.getElementById('auto_connect').checked=!!(cfg.dinplug&&cfg.dinplug.auto_connect);document.getElementById('info').textContent=`Status: ${status.dinplug_status||'-'}\nSaved gateway: ${(cfg.dinplug&&cfg.dinplug.gateway_host)||'-'}\nAuto connect: ${cfg.dinplug&&cfg.dinplug.auto_connect?'true':'false'}`;}init().catch(e=>{document.getElementById('info').textContent='Load failed: '+e;});</script></body></html>
