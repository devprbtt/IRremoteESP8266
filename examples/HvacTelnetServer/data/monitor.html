<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#0a0e14">
  <title>Monitor - IR HVAC Telnet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #0a0e14;
      --surface: #151b24;
      --surface-elevated: #1c232e;
      --border: #2a3444;
      --text: #f0f4f8;
      --text-muted: #8899aa;
      --primary: #3b82f6;
      --success: #22c55e;
      --terminal-bg: #0d1117;
      --terminal-text: #22c55e;
      --radius: 12px;
      --radius-sm: 8px;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 100px;
    }
    .header { text-align: center; padding: 24px 0 16px; }
    .header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .header p { margin: 4px 0 0; color: var(--text-muted); font-size: 0.875rem; }
    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
      gap: 8px;
      z-index: 100;
    }
    nav a {
      flex: 1;
      max-width: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 600;
    }
    nav a.active { color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    nav svg { width: 22px; height: 22px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      margin: 0 0 12px;
      font-size: 0.95rem;
      font-weight: 700;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--surface-elevated);
      font-size: 0.8rem;
      font-weight: 600;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }
    button, .link-btn {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: white;
      text-decoration: none;
    }
    .btn-primary { background: var(--success); }
    .btn-secondary { background: var(--primary); }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .terminal {
      background: var(--terminal-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      height: 360px;
      overflow-y: auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      color: var(--terminal-text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .status-box {
      margin-top: 12px;
      padding: 12px;
      background: var(--surface-elevated);
      border-radius: var(--radius-sm);
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Monitor</h1>
      <p>Telnet log, IR capture, and quick actions</p>
    </header>

    <div class="card">
      <h3 class="card-title">Monitor Control</h3>
      <div class="row">
        <div class="status-pill"><span id="dot" class="status-dot"></span><span id="mon_state">Loading...</span></div>
        <button class="btn-primary" type="button" id="toggle_btn">Toggle</button>
        <button class="btn-secondary" type="button" id="copy_last_btn">Copy Last IR</button>
        <button class="btn-secondary" type="button" id="copy_all_btn">Copy All IR</button>
        <button class="btn-outline" type="button" id="clear_btn">Clear</button>
        <a class="link-btn btn-outline" href="/hvacs/test">Open HVAC Test</a>
      </div>
      <div class="status-box" id="status">Ready</div>
    </div>

    <div class="card">
      <h3 class="card-title">Live Log</h3>
      <div id="log_box" class="terminal">Loading...</div>
    </div>
  </div>

  <nav>
    <a href="/">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Home
    </a>
    <a href="/config">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Config
    </a>
    <a href="/monitor" class="active">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      Monitor
    </a>
    <a href="/firmware">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
      Firmware
    </a>
  </nav>

  <script>
    const J = (u, o) => fetch(u, o).then((r) => r.json());
    let lines = [];
    let enabled = false;

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function irCodes() {
      return lines.filter((l) => l.includes("ir-rx ")).map((l) => l.slice(l.indexOf("ir-rx ") + 6));
    }

    async function copyText(text) {
      if (!text) {
        setStatus("No IR code available.");
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        setStatus("Copied to clipboard.");
      } catch (_e) {
        setStatus("Clipboard copy failed.");
      }
    }

    async function loadMonitor() {
      const d = await J("/api/monitor");
      enabled = !!d.enabled;
      lines = d.lines || [];
      document.getElementById("mon_state").textContent = enabled ? "Monitor enabled" : "Monitor disabled";
      document.getElementById("dot").classList.toggle("active", enabled);
      const log = document.getElementById("log_box");
      log.textContent = lines.join("\n");
      log.scrollTop = log.scrollHeight;
    }

    async function toggleMonitor() {
      const body = new URLSearchParams({ enabled: enabled ? "0" : "1" });
      await fetch("/monitor/toggle", { method: "POST", body });
      await loadMonitor();
    }

    async function clearMonitor() {
      await fetch("/monitor/clear", { method: "POST" });
      await loadMonitor();
      setStatus("Log cleared.");
    }

    document.getElementById("toggle_btn").addEventListener("click", () => toggleMonitor().catch((e) => setStatus(`Toggle failed: ${e}`)));
    document.getElementById("clear_btn").addEventListener("click", () => clearMonitor().catch((e) => setStatus(`Clear failed: ${e}`)));
    document.getElementById("copy_last_btn").addEventListener("click", () => {
      const codes = irCodes();
      copyText(codes.length ? codes[codes.length - 1] : "");
    });
    document.getElementById("copy_all_btn").addEventListener("click", () => {
      const codes = irCodes();
      copyText(codes.join("\n"));
    });

    loadMonitor().catch((e) => setStatus(`Load failed: ${e}`));
    setInterval(() => loadMonitor().catch((e) => setStatus(`Refresh failed: ${e}`)), 1000);
  </script>
</body>
</html>
